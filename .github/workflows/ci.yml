# CI for the multimodal medical AI platform.
#
# IMPORTANT: GitHub only runs this workflow when the repository ROOT is the
# medical-platform/ project (this file must resolve to <repo-root>/.github/
# workflows/ci.yml). The repo was re-rooted at medical-platform/ in June 2026,
# so that holds — but it still only executes once the repo is pushed to GitHub.
#
# What this runs:
#   backend  — install the full ML stack (needed just to import apps.inference,
#              which eagerly imports the torch pipelines), Django system check,
#              byte-compile, then the REAL weight-free test suites on an
#              in-memory SQLite test DB (doctor-isolation + auth). The inference
#              pipeline tests are NOT run here: their sample files live under the
#              git-ignored backend/media/, so they would either skip or download
#              ~700 MB of model weights — run `manage.py test tests.test_pipelines`
#              locally for those.
#   frontend — ESLint (must exit 0) + production build.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      # python-decouple requires SECRET_KEY (no default); the rest have defaults.
      # This is a throwaway CI key, never used in production.
      SECRET_KEY: ci-only-not-a-secret-do-not-use-in-prod
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # djongo 1.3.6 supports 3.10/3.11 only (not 3.12+)
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies (full stack — Django needs torch to import apps.inference)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Django system check
        working-directory: backend
        run: python manage.py check

      - name: Byte-compile backend
        working-directory: backend
        run: python -m compileall apps core

      - name: Run weight-free tests (in-memory SQLite; doctor isolation + auth)
        working-directory: backend
        run: python manage.py test tests.test_doctor_isolation apps.authentication --noinput --verbosity 2

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'        # Vite 8 / React 19 need Node >= 20.19
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (must exit 0)
        working-directory: frontend
        run: npm run lint

      - name: Production build
        working-directory: frontend
        run: npm run build
